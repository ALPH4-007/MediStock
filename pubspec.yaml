name: medistock
description: "A new Flutter project."
publish_to: 'none'

version: 0.1.0+1


environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter


    
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.8.3

  # UI & formatting
  intl: ^0.20.3

  # state management
  provider: ^6.1.5+1

  # local storage
  shared_preferences: ^2.5.5

  # icons
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2

  # barcode scanning
  mobile_scanner: ^7.2.0

  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # future assets
  assets:
    - assets/images/
    - assets/icons/