name: medistock
description: "A new Flutter project."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & formatting
  intl: ^0.20.3

  # state management
  provider: ^6.1.5+1

  # local storage
  shared_preferences: ^2.5.5

  # icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # future assets
  assets:
    - assets/images/
    - assets/icons/